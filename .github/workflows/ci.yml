name: Project-NM CI

# 觸發條件：當 main 分支有 push 或 pull_request 時執行
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # 1. 檢出程式碼
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 設定 Go 環境
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true # 啟用快取以加速後續執行

      # 3. 下載依賴套件
      - name: Install Dependencies
        run: go mod download

      # 4. 執行單元測試
      - name: Run Tests
        run: go test -v ./...

      # 5. 編譯檢查 (確保程式碼可以正確打包)
      - name: Build Application
        run: go build -v -o main .

      # 6. Docker 編譯驗證 (確保 Dockerfile 無誤)
      - name: Build Docker Image
        run: docker build -t project-nm:test .



# cache: true：這會快取您的 go.mod 依賴。當專案依賴變多時，這可以節省數分鐘的下載時間。

# go test -v ./...：./... 指令會遞迴搜尋專案下所有的 _test.go 檔案並執行。在開發高併發系統時，這是確保工具類（Utils）正確性的防線。

# docker build 驗證：在 CI 階段跑 Docker 編譯是為了確保當您在不同地點開發並推送代碼後，遠端的環境也能正確構建映像檔，而不會因為漏掉某個檔案而