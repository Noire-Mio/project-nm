syntax = "proto3";

package pb;
option go_package = "./pb";

service ProjectGrpc {
    rpc ExecuteOrder (TradeGrpcRequest) returns (TradeGrpcResponse);
}

message TradeGrpcItem {
	uint32 product_id = 1;
	int64 quantity = 2;
	string type = 3;
}

message TradeGrpcRequest {
	GRPCUserInfo grpc_user_info = 1;
	repeated TradeGrpcItem items = 2;
}

message TradeGrpcResponse {
	uint32 member_id = 1;
	string status = 2;
}


message GRPCUserInfo {
  uint64 user_id = 1;                
  string identity = 2;
  string name = 3;
  string schema = 4;
}